services:
  postgres:
    image: postgres:17-alpine
    container_name: pharmacol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmacol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacol_dev}
      POSTGRES_DB: pharmacol
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pharmacol_pg_data:/var/lib/postgresql/data
      - ./database/scripts/001_extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./infra/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacol -d pharmacol"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pharmacol-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - pharmacol_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: pharmacol-backend
    restart: unless-stopped
    # .env solo para sustituir ${VAR}; DATABASE_URL/REDIS_URL van en environment (red Docker)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pharmacol:${POSTGRES_PASSWORD:-pharmacol_dev}@postgres:5432/pharmacol?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      INVIMA_APP_TOKEN: ${INVIMA_APP_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SYNC_CRON_CUM: ${SYNC_CRON_CUM:-0 3 * * *}
      SYNC_CRON_DM: ${SYNC_CRON_DM:-0 4 * * *}
      NODE_ENV: production
      API_PORT: ${API_PORT:-3005}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    # Solo localhost — el acceso público va por nginx :443 → :8080
    expose:
      - "3005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-/pharmacol/v1}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/pharmacol/}
        NGINX_CONF: ${PHARMACOL_NGINX_CONF:-web-subpath.conf}
    container_name: pharmacol-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    # 127.0.0.1 solo host; pharma-edge accede vía red Docker (connect-pharma-network.sh)
    ports:
      - "127.0.0.1:${PHARMACOL_HTTP_PORT:-8080}:80"
    expose:
      - "80"

  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.migrate
    container_name: pharmacol-migrate
    environment:
      DATABASE_URL: postgresql://pharmacol:${POSTGRES_PASSWORD:-pharmacol_dev}@postgres:5432/pharmacol?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup

  seed:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.seed
    container_name: pharmacol-seed
    environment:
      DATABASE_URL: postgresql://pharmacol:${POSTGRES_PASSWORD:-pharmacol_dev}@postgres:5432/pharmacol?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup

volumes:
  pharmacol_pg_data:
  pharmacol_redis_data:
