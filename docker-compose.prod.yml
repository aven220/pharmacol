services:
  postgres:
    image: postgres:17-alpine
    container_name: pharmacol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmacol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacol_dev}
      POSTGRES_DB: pharmacol
    ports:
      - "5433:5432"
    volumes:
      - pharmacol_pg_data:/var/lib/postgresql/data
      - ./database/scripts/001_extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./infra/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacol -d pharmacol"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pharmacol-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - pharmacol_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: pharmacol-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pharmacol:${POSTGRES_PASSWORD:-pharmacol_dev}@postgres:5432/pharmacol?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INVIMA_APP_TOKEN: ${INVIMA_APP_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
      API_PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: pharmacol-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    profiles:
      - production

volumes:
  pharmacol_pg_data:
  pharmacol_redis_data:
