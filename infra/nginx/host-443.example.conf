# PharmaCol — Nginx del SERVIDOR (HTTPS :443 → Docker 127.0.0.1:8080)
#
# Instalación:
#   PHARMACOL_DOMAIN=pharmacol.midominio.com bash scripts/install-host-nginx.sh
#
# Manual:
#   1. Incluir infra/nginx/http-upgrade-map.conf en nginx.conf (bloque http)
#   2. sudo cp este archivo → /etc/nginx/sites-available/pharmacol
#   3. Editar server_name y rutas SSL
#   4. sudo ln -sf /etc/nginx/sites-available/pharmacol /etc/nginx/sites-enabled/
#   5. sudo certbot certonly --nginx -d TU_DOMINIO
#   6. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pharmacol.tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/pharmacol.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmacol.tudominio.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8080/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
        client_max_body_size  20m;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name pharmacol.tudominio.com;
    return 301 https://$host$request_uri;
}
