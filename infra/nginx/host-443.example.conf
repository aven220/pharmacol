# PharmaCol — HTTPS :443 → Docker 127.0.0.1:8080

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pharmacol.tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/pharmacol.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmacol.tudominio.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # Portal web + API /v1 + Swagger /docs
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # Sync INVIMA / peticiones largas a la API
    location /v1/ {
        proxy_pass http://127.0.0.1:8080/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
        client_max_body_size  20m;
    }
}

# Redirección HTTP → HTTPS (solo si el puerto 80 está abierto)
server {
    listen 80;
    listen [::]:80;
    server_name pharmacol.tudominio.com;
    return 301 https://$host$request_uri;
}