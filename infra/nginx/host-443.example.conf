# Nginx del SERVIDOR (host) — termina TLS en :443 y proxy a PharmaCol Docker (:8080 local)
#
# Copiar a tu nginx del servidor, por ejemplo:
#   sudo cp infra/nginx/host-443.example.conf /etc/nginx/sites-available/pharmacol
#   sudo ln -sf /etc/nginx/sites-available/pharmacol /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Reemplaza:
#   pharmacol.tudominio.com  → tu subdominio real
#   rutas ssl_certificate      → tus certificados (Let's Encrypt, etc.)

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pharmacol.tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/pharmacol.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmacol.tudominio.com/privkey.pem;

    client_max_body_size 20m;

    # Portal web + API (/v1) + Swagger (/docs) — todo vía contenedor pharmacol-web
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

# Redirigir HTTP → HTTPS (opcional; si el puerto 80 también está cerrado, no hace falta)
server {
    listen 80;
    listen [::]:80;
    server_name pharmacol.tudominio.com;
    return 301 https://$host$request_uri;
}
