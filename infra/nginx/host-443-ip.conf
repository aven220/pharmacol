# PharmaCol — HTTPS por IP (sin dominio) → Docker 127.0.0.1:8080
#
# Requisito: certificado autofirmado
#   bash scripts/generate-selfsigned-ip.sh
#   bash scripts/install-host-nginx.sh
#
# El navegador mostrará aviso de seguridad (normal con IP + autofirmado).
# Acepta el certificado o usa "Avanzado → Continuar".

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name 20.5.19.8;

    ssl_certificate     /etc/nginx/ssl/pharmacol-ip/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pharmacol-ip/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8080/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
        client_max_body_size  20m;
    }
}
